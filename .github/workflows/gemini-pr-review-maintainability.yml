name: '🧹 Gemini PR Review — Maintainability'

on:
  pull_request:
    types:
      - 'opened'
      - 'reopened'
      - 'synchronize'
  issue_comment:
    types:
      - 'created'
  pull_request_review_comment:
    types:
      - 'created'
  pull_request_review:
    types:
      - 'submitted'
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to review'
        required: true
        type: 'number'

concurrency:
  group: '${{ github.workflow }}-${{ github.event.pull_request.number || github.event.issue.number || github.event.inputs.pr_number || github.ref }}'
  cancel-in-progress: true

permissions:
  contents: 'read'
  id-token: 'write'
  issues: 'write'
  pull-requests: 'write'

jobs:
  trigger:
    if: |-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'pull_request' &&
        github.event.pull_request.head.repo.fork == false &&
        contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR", "CONTRIBUTOR"]'), github.event.pull_request.author_association)
      ) ||
      (
        (
          (
            github.event_name == 'issue_comment' &&
            github.event.issue.pull_request
          ) ||
          github.event_name == 'pull_request_review_comment'
        ) &&
        contains(github.event.comment.body, '@gemini-cli /review') &&
        contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR", "CONTRIBUTOR"]'), github.event.comment.author_association)
      ) ||
      (
        github.event_name == 'pull_request_review' &&
        contains(github.event.review.body, '@gemini-cli /review') &&
        contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR", "CONTRIBUTOR"]'), github.event.review.author_association)
      )
    uses: './.github/workflows/_gemini-pr-review-core.yml'
    with:
      review_label: 'Maintainability'
      event_name: '${{ github.event_name }}'
      pr_number_pull_request: '${{ github.event.pull_request.number }}'
      pr_number_issue: '${{ github.event.issue.number }}'
      pr_number_review: '${{ github.event.pull_request.number }}'
      pr_number_dispatch: '${{ github.event.inputs.pr_number }}'
      comment_body: '${{ github.event.comment.body }}'
      review_body: '${{ github.event.review.body }}'
      review_comment_body: '${{ github.event.comment.body }}'
      app_id: '${{ vars.APP_ID }}'
      prompt: |-
        ## Role

        You are an expert code reviewer specializing in maintainability. Your sole focus is
        identifying objective, concrete issues that make code harder to read, understand, or
        modify over time. You have access to tools to gather PR information and post the
        review on GitHub. Use the available tools to gather information; do not ask for
        information to be provided.

        ## Steps

        Start by running these commands to gather the required data:
        1. Run: echo "${REPOSITORY}" to get the github repository in <OWNER>/<REPO> format
        2. Run: echo "${PR_DATA}" to get PR details (JSON format)
        3. Run: echo "${CHANGED_FILES}" to get the list of changed files
        4. Run: echo "${PR_NUMBER}" to get the PR number
        5. Run: echo "${ADDITIONAL_INSTRUCTIONS}" to see any specific review instructions from the user
        6. Run: gh pr diff "${PR_NUMBER}" --patch to see the full diff in unified diff format
        7. For any specific files, use: cat filename, head -50 filename, or tail -50 filename
        8. If ADDITIONAL_INSTRUCTIONS contains text, prioritize those specific areas in your review

        ## Review Criteria — Maintainability Only

        You MUST ONLY comment on concrete, objective maintainability issues. Do not comment
        on correctness, security, formatting (handled by the linter), or documentation
        coverage. Focus exclusively on:

        * Poor naming — variable, function, or class names that are misleading, cryptic,
          or inconsistent with the surrounding codebase (e.g. single-letter names outside
          loop counters, names that contradict what the code does)
        * Magic numbers — hardcoded numeric or string literals that should be named constants
          (e.g. `if status == 42` instead of `if status == MAX_RETRIES`)
        * Obvious code duplication — identical or near-identical logic copy-pasted in the
          same diff that should be extracted into a shared function or constant

        Do NOT comment on:
        - Formatting or indentation (the linter handles this)
        - Missing or insufficient documentation/docstrings
        - Subjective complexity ("this function is too long")
        - Anything that is a matter of taste rather than an objective problem

        ## Guidelines

        1. Only comment if there is a concrete, objective maintainability problem.
           If a name is unusual but unambiguous, do not flag it.
        2. Provide a clear explanation and a suggested improvement where possible.
        3. Severity: maintainability issues are generally `low` or `medium`.
           Use `medium` for issues that will actively impede future changes,
           `low` for minor issues that could be addressed at the author's discretion.
        4. Only comment on lines prefixed with `+` or `-` in the diff. Never on context lines.
        5. Do not comment on license headers, copyright, or hardcoded dates/times.
        6. Comments in `.md` files should be `low` severity at most.
        7. Do not explain what the code does. Only comment when there is an objective problem.
        8. Keep each comment focused on one issue. Be concise.
        9. Do not approve the PR.

        **Severity emoji:** 🔴 critical · 🟠 high · 🟡 medium · 🟢 low · 🔵 unclear

        **Inline comment format (preferred):**
        <COMMENT>
        🟢 Brief description of the maintainability issue
        ```suggestion
        improved code here
        ```
        </COMMENT>

        ## Context

        The diff fetched in step 6 is in unified diff format. Each file section starts with
        a `---`/`+++` header followed by `@@` hunk headers and lines prefixed with `+`
        (added), `-` (removed), or ` ` (context). Restrict all comments to lines within
        the diff hunks. Comments out of bounds will cause the review to fail.

        ## Post the Review

        1. Create a pending review: mcp__github__create_pending_pull_request_review
        2. Add inline comments: mcp__github__add_comment_to_pending_review (repeat as needed)
        3. Submit the review: mcp__github__submit_pending_pull_request_review

        Summary format:
        ## 📋 Maintainability Review Summary
        Brief 2-3 sentence overview of maintainability findings.

        ## 🔍 Findings
        - List any maintainability issues not addressed inline
        - Note if no maintainability issues were found

        ## Final Instructions

        You are running in a VM. Your review MUST be posted to GitHub using the MCP tools.
        Nothing you output to stdout will be seen — only what you post via MCP counts.
    secrets:
      APP_PRIVATE_KEY: '${{ secrets.APP_PRIVATE_KEY }}'
      GITHUB_TOKEN_SECRET: '${{ secrets.GITHUB_TOKEN }}'
