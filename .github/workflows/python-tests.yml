name: 🐍 Python Tests

on:
  pull_request:
    paths:
      # Only file types that can meaningfully affect Python test results.
      # Doc-only PRs (README changes etc.) intentionally skip this workflow.
      - "core/**/*.py"
      - "core/**/pyproject.toml"
      - "core/**/uv.lock"
      - "core/**/manifest.yaml"
      - "contrib/**/*.py"
      - "contrib/**/pyproject.toml"
      - "contrib/**/uv.lock"
      - "contrib/**/manifest.yaml"
      - ".github/workflows/python-tests.yml"
  workflow_dispatch:
    inputs:
      run_all:
        description: "Run tests for all Python recipes (ignore diff)"
        type: boolean
        default: true

permissions:
  contents: read

# Cancel superseded runs on the same PR (or on the same ref for
# workflow_dispatch) so a rapid series of pushes doesn't queue up redundant
# matrix runs.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  detect-recipes:
    name: Detect affected Python recipes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      recipes: ${{ steps.detect.outputs.recipes }}
      count: ${{ steps.detect.outputs.count }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect Python recipes to test
        id: detect
        env:
          # Pass user-controlled and dynamic values through env vars rather
          # than interpolating GitHub expressions directly into the script
          # body (security hardening — see GitHub Actions hardening guide).
          EVENT_NAME: ${{ github.event_name }}
          RUN_ALL: ${{ github.event.inputs.run_all }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          set -euo pipefail

          # pipefail matters here: without it, a transient `git fetch` failure
          # would produce an empty diff → 0 recipes → skipped matrix →
          # skipped gate → branch protection sees the required check as
          # passing without ever running a test.

          # Robust "is this a Python recipe" check: tolerates single/double/no
          # quotes around the value, case-insensitive on the value, and a
          # trailing YAML comment. Replaces two duplicated grep patterns.
          is_python_recipe() {
            grep -qiE "^[[:space:]]*language:[[:space:]]*[\"']?python[\"']?[[:space:]]*(#.*)?$" "$1"
          }

          # Helper: collect all Python recipe dirs under core/ and contrib/.
          # A recipe dir is any directory that contains a manifest.yaml
          # declaring language: python.
          all_python_recipes() {
            for root in core contrib; do
              [ -d "$root" ] || continue
              while IFS= read -r manifest; do
                if is_python_recipe "$manifest"; then
                  dirname "$manifest"
                fi
              done < <(find "$root" -name "manifest.yaml")
            done
          }

          # Helper: given a changed file path, return the recipe dir that
          # owns it by walking up until we find a directory containing
          # manifest.yaml.
          find_recipe_dir() {
            local path="$1"
            local dir
            dir="$(dirname "$path")"
            while [ "$dir" != "." ] && [ "$dir" != "/" ]; do
              if [ -f "$dir/manifest.yaml" ]; then
                echo "$dir"
                return
              fi
              dir="$(dirname "$dir")"
            done
          }

          # These env vars can be null (workflow_dispatch has no PR;
          # pull_request has no inputs). set -u would otherwise error.
          RUN_ALL="${RUN_ALL:-}"
          BASE_REF="${BASE_REF:-}"

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            if [ "$RUN_ALL" != "true" ]; then
              # PR-diff mode requires a base ref, which workflow_dispatch
              # does not provide. Silently falling back to origin/main
              # produces an empty diff when the workflow was dispatched
              # from main and green-lights the run without testing anything.
              # Refuse the combination explicitly.
              echo "::error::workflow_dispatch requires run_all=true. PR-diff mode is only available on pull_request events."
              exit 1
            fi
            echo "workflow_dispatch with run_all=true — testing all Python recipes."
            RECIPES=$(all_python_recipes)
          else
            # PR mode: diff against the base branch.
            if [ -z "$BASE_REF" ]; then
              echo "::error::pull_request event with no base ref — cannot compute diff."
              exit 1
            fi
            git fetch origin "$BASE_REF"
            CHANGED_FILES=$(git diff --name-only "origin/$BASE_REF"...HEAD)

            echo "Changed files:"
            echo "$CHANGED_FILES"

            # Map each changed file to its recipe dir (nearest ancestor with
            # manifest.yaml) and keep only unique Python recipe dirs.
            RECIPES=""
            while IFS= read -r file; do
              [ -z "$file" ] && continue
              case "$file" in
                core/*|contrib/*) ;;
                *) continue ;;
              esac
              recipe_dir="$(find_recipe_dir "$file")"
              [ -z "$recipe_dir" ] && continue
              if is_python_recipe "$recipe_dir/manifest.yaml"; then
                RECIPES="${RECIPES}${recipe_dir}"$'\n'
              else
                echo "[SKIP] $recipe_dir — not a Python recipe."
              fi
            done <<< "$CHANGED_FILES"

            # Deduplicate and strip blank lines produced by trailing newlines
            RECIPES=$(echo "$RECIPES" | sort -u | sed '/^[[:space:]]*$/d')
          fi

          if [ -z "$RECIPES" ]; then
            echo "No Python recipes to test."
            echo "recipes=[]" >> "$GITHUB_OUTPUT"
            echo "count=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Python recipes to test:"
          echo "$RECIPES"

          # Emit as a JSON array for the matrix
          JSON=$(echo "$RECIPES" | jq -R . | jq -sc .)
          echo "recipes=$JSON" >> "$GITHUB_OUTPUT"
          echo "count=$(echo "$RECIPES" | wc -l | tr -d ' ')" >> "$GITHUB_OUTPUT"

  run-tests:
    name: "pytest — ${{ matrix.recipe }}"
    needs: detect-recipes
    if: needs.detect-recipes.outputs.count != '0'
    runs-on: ubuntu-latest
    # 20 min covers uv sync + runnability test with headroom. Override per
    # matrix entry later if a specific recipe needs longer.
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        recipe: ${{ fromJson(needs.detect-recipes.outputs.recipes) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        # Leave enable-cache at the default (true) — wheel caching between
        # runs is worthwhile here (contrast with detect-recipes above).
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.11"

      - name: Verify test structure
        working-directory: ${{ matrix.recipe }}
        env:
          RECIPE: ${{ matrix.recipe }}
        run: |
          set -euo pipefail

          if [ ! -d "tests" ]; then
            echo "::error::Missing tests/ directory in ${RECIPE}"
            exit 1
          fi

          # `find … -print -quit` stops after the first match without needing
          # a pipe. `find … | head -1` under pipefail would false-fail when
          # `head` closes stdin early and `find` dies from SIGPIPE.
          RUNNABILITY=$(find tests -name "test_runnability.py" -print -quit)
          if [ -z "$RUNNABILITY" ]; then
            echo "::error::No test_runnability.py found under ${RECIPE}/tests/"
            exit 1
          fi

          echo "Found: $RUNNABILITY"

      - name: Install dependencies
        working-directory: ${{ matrix.recipe }}
        run: uv sync --dev

      - name: Set up .env for tests
        working-directory: ${{ matrix.recipe }}
        run: |
          set -euo pipefail
          if [ ! -f .env ] && [ -f .env.example ]; then
            cp .env.example .env
            echo "Copied .env.example to .env"
          fi

      - name: Run pytest
        working-directory: ${{ matrix.recipe }}
        run: uv run pytest

  # Final gate. `if: always()` so the required check always reports even when
  # detect-recipes or run-tests were cancelled/skipped/failed — a skipped
  # required check is often treated as passing by branch protection, which is
  # the silent-green failure mode we're guarding against.
  #
  # Fails if:
  #   - detect-recipes did not succeed (crash, cancellation, ...)
  #   - run-tests ended in any state other than success or skipped
  # `skipped` on run-tests is OK because it means detect-recipes legitimately
  # found zero Python recipes to test.
  test-results:
    name: Python test results
    needs: [detect-recipes, run-tests]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check results
        env:
          DETECT_RESULT: ${{ needs.detect-recipes.result }}
          RUN_RESULT: ${{ needs.run-tests.result }}
        run: |
          set -euo pipefail

          if [ "$DETECT_RESULT" != "success" ]; then
            echo "::error::detect-recipes did not succeed (result: $DETECT_RESULT)."
            exit 1
          fi

          case "$RUN_RESULT" in
            success)
              echo "All Python recipe tests passed."
              ;;
            skipped)
              echo "No Python recipes to test — gate passes."
              ;;
            *)
              echo "::error::run-tests did not succeed (result: $RUN_RESULT)."
              exit 1
              ;;
          esac
