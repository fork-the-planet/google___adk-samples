name: Validate Python Recipe

on:
  pull_request:
    paths:
      - 'core/python/**'
      - 'contrib/**'
      - '.github/workflows/python-validate-recipe.yml'
      - '.github/policy.yml'
      - '.github/scripts/load_policy.py'
      - '.github/scripts/check_env_vars.py'
      - '.github/scripts/check_recipe_pyproject.py'

permissions:
  contents: read

jobs:
  validate-python-recipes:
    name: Check Python recipe structure and constraints
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.11"
          enable-cache: false

      - name: Detect affected Python recipe directories
        id: affected
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          set -euo pipefail

          git fetch origin "$BASE_REF"
          CHANGED_FILES=$(git diff --name-only "origin/$BASE_REF"...HEAD)

          echo "Changed files:"
          echo "$CHANGED_FILES"

          # If any infrastructure file that controls this workflow's behaviour
          # changed (the workflow itself, the policy limits, or any checker
          # script), validate ALL Python recipes so the new configuration is
          # applied across the board rather than only to the recipes touched
          # in the same PR.
          INFRA_CHANGED=$(echo "$CHANGED_FILES" | grep -E "^(\.github/workflows/python-validate-recipe\.yml|\.github/policy\.yml|\.github/scripts/(load_policy|check_env_vars|check_recipe_pyproject)\.py)$" || true)
          if [ -n "$INFRA_CHANGED" ]; then
            echo "Workflow, policy, or checker script changed — validating all Python recipes."
            echo "validate_all=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # ---------------------------------------------------------------------------
          # Determine which recipe directories are Python recipes.
          #
          # A recipe is Python if:
          #   (a) It lives under core/python/<recipe>/, OR
          #   (b) Its manifest.yaml contains:  language: "python"
          #
          # Layout:
          #   core/python/<recipe>/...  — always Python (namespace dir)
          #   contrib/<recipe>/...      — Python only if manifest says so
          # ---------------------------------------------------------------------------

          CHANGED_RECIPES=""

          while IFS= read -r file; do
            [ -z "$file" ] && continue

            recipe_dir=""

            case "$file" in
              core/python/*/*)
                # core/python/<recipe>/anything → recipe is core/python/<recipe>
                without_root="${file#core/python/}"            # <recipe>/rest
                recipe_name="${without_root%%/*}"              # <recipe>
                recipe_dir="core/python/${recipe_name}"
                ;;
              contrib/*/*)
                # contrib/<recipe>/anything → candidate, check manifest later
                without_root="${file#contrib/}"
                recipe_name="${without_root%%/*}"
                recipe_dir="contrib/${recipe_name}"
                ;;
              *)
                continue
                ;;
            esac

            [ -z "$recipe_dir" ] && continue
            [ -d "$recipe_dir" ] || continue   # skip deleted dirs

            # For contrib recipes, only include if manifest.yaml declares language: python
            if [[ "$recipe_dir" == contrib/* ]]; then
              manifest="$recipe_dir/manifest.yaml"
              if [ ! -f "$manifest" ]; then
                continue
              fi
              # Match:  language: python  or  language: "python"  or  language: 'python'
              # Trailing YAML comments (e.g. `language: python  # note`) are permitted.
              if ! grep -qE '^\s*language\s*:\s*["'"'"']?python["'"'"']?\s*(#.*)?$' "$manifest"; then
                continue
              fi
            fi

            CHANGED_RECIPES="${CHANGED_RECIPES}${recipe_dir}"$'\n'
          done <<< "$CHANGED_FILES"

          # Deduplicate
          CHANGED_RECIPES=$(echo "$CHANGED_RECIPES" | sort -u | grep -v '^$' || true)

          echo "Python recipe directories to validate:"
          echo "$CHANGED_RECIPES"

          # Store as newline-delimited multiline output to avoid word-splitting on spaces
          {
            echo "changed_recipes<<RECIPES_EOF"
            echo "$CHANGED_RECIPES"
            echo "RECIPES_EOF"
          } >> "$GITHUB_OUTPUT"
          echo "validate_all=false" >> "$GITHUB_OUTPUT"

      - name: Collect all Python recipe directories (workflow changed)
        id: all_recipes
        if: steps.affected.outputs.validate_all == 'true'
        run: |
          set -euo pipefail

          ALL=""

          # core/python/* — always Python
          for d in core/python/*/; do
            [ -d "$d" ] && ALL="${ALL}${d%/}"$'\n'
          done

          # contrib/* — only if manifest declares python
          for d in contrib/*/; do
            [ -d "$d" ] || continue
            manifest="${d}manifest.yaml"
            [ -f "$manifest" ] || continue
            # Trailing YAML comments (e.g. `language: python  # note`) are permitted.
            if grep -qE '^\s*language\s*:\s*["'"'"']?python["'"'"']?\s*(#.*)?$' "$manifest"; then
              ALL="${ALL}${d%/}"$'\n'
            fi
          done

          ALL=$(echo "$ALL" | sort -u | grep -v '^$' || true)

          # Store as newline-delimited multiline output to avoid word-splitting on spaces
          {
            echo "all_recipes<<RECIPES_EOF"
            echo "$ALL"
            echo "RECIPES_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Validate Python recipe structure
        env:
          VALIDATE_ALL: ${{ steps.affected.outputs.validate_all }}
          ALL_RECIPES: ${{ steps.all_recipes.outputs.all_recipes }}
          CHANGED_RECIPES: ${{ steps.affected.outputs.changed_recipes }}
        run: |
          set -euo pipefail

          # ==================================================================
          # Load configurable limits from .github/policy.yml (single source of
          # truth for repo-wide constants). Every value below is looked up by
          # dotted key path; to change a limit, edit policy.yml.
          # ==================================================================
          POLICY=(uv run --no-project --with pyyaml python3 .github/scripts/load_policy.py)

          MAX_FOLDER_NAME_LENGTH=$("${POLICY[@]}" recipe_naming.max_folder_name_length)

          CORE_MAX_FILES=$("${POLICY[@]}" recipe_size_limits.core.default.max_files)
          CORE_MAX_SIZE_MB=$("${POLICY[@]}" recipe_size_limits.core.default.max_size_mb)
          CORE_LARGE_MAX_FILES=$("${POLICY[@]}" recipe_size_limits.core.large.max_files)
          CORE_LARGE_MAX_SIZE_MB=$("${POLICY[@]}" recipe_size_limits.core.large.max_size_mb)

          CONTRIB_MAX_FILES=$("${POLICY[@]}" recipe_size_limits.contrib.default.max_files)
          CONTRIB_MAX_SIZE_MB=$("${POLICY[@]}" recipe_size_limits.contrib.default.max_size_mb)
          CONTRIB_LARGE_MAX_FILES=$("${POLICY[@]}" recipe_size_limits.contrib.large.max_files)
          CONTRIB_LARGE_MAX_SIZE_MB=$("${POLICY[@]}" recipe_size_limits.contrib.large.max_size_mb)

          # Excluded paths — union across every language section in policy.yml
          # so the check is consistent regardless of the recipe's declared
          # language. New languages: add a section under `excluded_paths:` in
          # policy.yml; no workflow change needed.
          EXCLUDED_DIRS=()
          EXCLUDED_FILES=()
          for section in common python java kotlin go typescript; do
            while IFS= read -r d; do
              [ -n "$d" ] && EXCLUDED_DIRS+=("$d")
            done < <("${POLICY[@]}" "excluded_paths.$section.dirs")
            while IFS= read -r f; do
              [ -n "$f" ] && EXCLUDED_FILES+=("$f")
            done < <("${POLICY[@]}" "excluded_paths.$section.files")
          done

          echo "[INFO] Policy loaded from .github/policy.yml"
          echo "[INFO]   core:    default=${CORE_MAX_FILES} files / ${CORE_MAX_SIZE_MB} MB, large=${CORE_LARGE_MAX_FILES} files / ${CORE_LARGE_MAX_SIZE_MB} MB"
          echo "[INFO]   contrib: default=${CONTRIB_MAX_FILES} files / ${CONTRIB_MAX_SIZE_MB} MB, large=${CONTRIB_LARGE_MAX_FILES} files / ${CONTRIB_LARGE_MAX_SIZE_MB} MB"
          echo "[INFO]   folder name max length: ${MAX_FOLDER_NAME_LENGTH}"
          echo "[INFO]   excluded dirs (${#EXCLUDED_DIRS[@]}): ${EXCLUDED_DIRS[*]}"
          echo "[INFO]   excluded files (${#EXCLUDED_FILES[@]}): ${EXCLUDED_FILES[*]}"

          if [ "$VALIDATE_ALL" = "true" ]; then
            RECIPES="$ALL_RECIPES"
          else
            RECIPES="$CHANGED_RECIPES"
          fi

          if [ -z "$RECIPES" ]; then
            echo "[INFO] No Python recipe directories to validate."
            exit 0
          fi

          FAILED=0

          # Each recipe is validated in a subshell so that set -e failures
          # (e.g. a transient `du` or `find` error) only abort that recipe's
          # checks, not the entire loop.  The subshell exits 1 if any check
          # fails; `|| FAILED=1` records the aggregate result in the parent.
          while IFS= read -r recipe; do
            [ -z "$recipe" ] && continue
            echo ""
            echo "========================================"
            echo "Validating: $recipe"
            echo "========================================"
            (
              RECIPE_FAILED=0

              # ------------------------------------------------------------------
              # Check 1: Folder name — only lowercase letters and hyphens allowed
              # ------------------------------------------------------------------
              folder_name="$(basename "$recipe")"
              if ! echo "$folder_name" | grep -qE '^[a-z][a-z-]*$'; then
                echo "::error file=$recipe::Folder name '$folder_name' is invalid. Only lowercase letters and hyphens are allowed (must start with a letter, no underscores, digits, or uppercase)."
                echo "[FAIL] Folder name: '$folder_name' — only lowercase letters and hyphens allowed."
                RECIPE_FAILED=1
              elif [ "${#folder_name}" -gt "$MAX_FOLDER_NAME_LENGTH" ]; then
                echo "::error file=$recipe::Folder name '$folder_name' is ${#folder_name} characters long. Maximum allowed is ${MAX_FOLDER_NAME_LENGTH} characters."
                echo "[FAIL] Folder name: '$folder_name' — exceeds 30 character limit."
                RECIPE_FAILED=1
              else
                echo "[PASS] Folder name: '$folder_name'"
              fi

              # ------------------------------------------------------------------
              # Check 2: Folder size  /  Check 3: File count
              #
              # Which limit applies is chosen by:
              #   1. Top-level ancestor of the recipe path (core vs contrib).
              #   2. `large:` field in manifest.yaml (default: false → default
              #      tier; true → relaxed tier).
              #
              # Files and directories listed under excluded_paths in
              # .github/policy.yml never count toward either the size or the
              # file count. Applied as a union across all language sections.
              # ------------------------------------------------------------------

              # Pick the tier limits based on core vs contrib ancestor.
              case "$recipe" in
                core/*)
                  TIER_ROOT="core"
                  DEFAULT_MAX_FILES="$CORE_MAX_FILES"
                  DEFAULT_MAX_SIZE_MB="$CORE_MAX_SIZE_MB"
                  LARGE_MAX_FILES="$CORE_LARGE_MAX_FILES"
                  LARGE_MAX_SIZE_MB="$CORE_LARGE_MAX_SIZE_MB"
                  ;;
                contrib/*)
                  TIER_ROOT="contrib"
                  DEFAULT_MAX_FILES="$CONTRIB_MAX_FILES"
                  DEFAULT_MAX_SIZE_MB="$CONTRIB_MAX_SIZE_MB"
                  LARGE_MAX_FILES="$CONTRIB_LARGE_MAX_FILES"
                  LARGE_MAX_SIZE_MB="$CONTRIB_LARGE_MAX_SIZE_MB"
                  ;;
                *)
                  echo "::error file=$recipe::Recipe path must live under core/ or contrib/, got '$recipe'"
                  echo "[FAIL] Unrecognised recipe root."
                  exit 1
                  ;;
              esac

              manifest="$recipe/manifest.yaml"
              # Trailing YAML comments (e.g. `large: true  # rationale`) are permitted.
              if [ -f "$manifest" ] && grep -qiE '^\s*large\s*:\s*true\s*(#.*)?$' "$manifest"; then
                EFFECTIVE_MAX_FILES="$LARGE_MAX_FILES"
                EFFECTIVE_MAX_SIZE_MB="$LARGE_MAX_SIZE_MB"
                echo "[INFO] Tier: $TIER_ROOT / large — limits ${EFFECTIVE_MAX_SIZE_MB} MB / ${EFFECTIVE_MAX_FILES} files."
              else
                EFFECTIVE_MAX_FILES="$DEFAULT_MAX_FILES"
                EFFECTIVE_MAX_SIZE_MB="$DEFAULT_MAX_SIZE_MB"
                echo "[INFO] Tier: $TIER_ROOT / default — limits ${EFFECTIVE_MAX_SIZE_MB} MB / ${EFFECTIVE_MAX_FILES} files."
              fi
              EFFECTIVE_MAX_SIZE_BYTES=$(( EFFECTIVE_MAX_SIZE_MB * 1024 * 1024 ))

              # Build a find expression that prunes excluded directories (fast
              # — find won't descend into them) and skips excluded file names.
              # Directory pruning uses -name (basename match), so e.g. a
              # `build/` anywhere in the recipe tree is excluded.
              FIND_CMD=(find "$recipe")
              if [ ${#EXCLUDED_DIRS[@]} -gt 0 ]; then
                FIND_CMD+=('(' -type d '(')
                for i in "${!EXCLUDED_DIRS[@]}"; do
                  [ "$i" -gt 0 ] && FIND_CMD+=(-o)
                  FIND_CMD+=(-name "${EXCLUDED_DIRS[$i]}")
                done
                FIND_CMD+=(')' -prune ')' -o)
              fi
              FIND_CMD+=('(' -type f)
              for file in "${EXCLUDED_FILES[@]}"; do
                FIND_CMD+=(-not -name "$file")
              done
              FIND_CMD+=(-print ')')

              # Enumerate the counted file list once, then derive both the
              # count and the total size from it — cheaper than two tree walks
              # and guarantees the two numbers stay consistent.
              mapfile -t COUNTED_FILES < <("${FIND_CMD[@]}")
              file_count=${#COUNTED_FILES[@]}

              if [ "$file_count" -eq 0 ]; then
                folder_size_bytes=0
              else
                # printf | xargs handles arbitrarily large file lists safely
                # (bypasses ARG_MAX on the command line).
                folder_size_bytes=$(printf '%s\0' "${COUNTED_FILES[@]}" \
                  | xargs -0 du -sb 2>/dev/null \
                  | awk '{s+=$1} END {print s+0}')
              fi
              folder_size_kb=$(( folder_size_bytes / 1024 ))

              if [ "$folder_size_bytes" -gt "$EFFECTIVE_MAX_SIZE_BYTES" ]; then
                echo "::error file=$recipe::Recipe folder exceeds ${EFFECTIVE_MAX_SIZE_MB} MB (${folder_size_kb} KB, excluding paths listed in .github/policy.yml). Remove large files or binaries."
                echo "[FAIL] Folder size: ${folder_size_kb} KB — exceeds ${EFFECTIVE_MAX_SIZE_MB} MB limit."
                RECIPE_FAILED=1
              else
                echo "[PASS] Folder size: ${folder_size_kb} KB"
              fi

              if [ "$file_count" -gt "$EFFECTIVE_MAX_FILES" ]; then
                echo "::error file=$recipe::Recipe folder contains $file_count files, exceeding the limit of ${EFFECTIVE_MAX_FILES}."
                echo "[FAIL] File count: $file_count — exceeds ${EFFECTIVE_MAX_FILES} file limit."
                RECIPE_FAILED=1
              else
                echo "[PASS] File count: $file_count"
              fi

              # ------------------------------------------------------------------
              # Check 4: Required files presence
              # ------------------------------------------------------------------
              REQUIRED_FILES=(
                "README.md"
                "pyproject.toml"
                "uv.lock"
                "manifest.yaml"
                ".env.example"
                "tests/test_runnability.py"
              )

              for required in "${REQUIRED_FILES[@]}"; do
                if [ ! -f "$recipe/$required" ]; then
                  echo "::error file=$recipe/$required::Required file '$required' is missing from recipe '$recipe'."
                  echo "[FAIL] Missing required file: $required"
                  RECIPE_FAILED=1
                else
                  echo "[PASS] Found required file: $required"
                fi
              done

              # ------------------------------------------------------------------
              # Check 5: Required keys in .env.example
              # ------------------------------------------------------------------
              REQUIRED_ENV_KEYS=(
                "GOOGLE_CLOUD_PROJECT"
                "GOOGLE_CLOUD_LOCATION"
                "MODEL_NAME"
              )

              if [ -f "$recipe/.env.example" ]; then
                for key in "${REQUIRED_ENV_KEYS[@]}"; do
                  if ! grep -qE "^(export\s+)?${key}(_[A-Z0-9_]*)?\s*=" "$recipe/.env.example"; then
                    echo "::error file=$recipe/.env.example::No environment variable starting with '${key}' found in .env.example. All recipes must declare at least one variable prefixed with GOOGLE_CLOUD_PROJECT, GOOGLE_CLOUD_LOCATION, and MODEL_NAME in their .env.example file."
                    echo "[FAIL] No env key with prefix '$key' found in .env.example."
                    RECIPE_FAILED=1
                  else
                    echo "[PASS] Found required env key in .env.example: $key"
                  fi
                done
              fi

              # ------------------------------------------------------------------
              # Check 6: Environment variables used in Python files but missing
              #           from .env.example.  Delegated to
              #          .github/scripts/check_env_vars.py, which AST-parses
              #          the recipe's Python source — handles multi-line calls,
              #          import aliases (from os import getenv), and suppresses
              #          false positives for OS/CI variables (HOME, PATH,
              #          GITHUB_*, INTEGRATION_TEST, …).
              # ------------------------------------------------------------------
              if [ -f "$recipe/.env.example" ]; then
                set +e
                env_vars_result=$(uv run --no-project \
                  python3 .github/scripts/check_env_vars.py "$recipe")
                env_vars_exit=$?
                set -e

                if [ "$env_vars_exit" -ne 0 ]; then
                  echo "::error file=$recipe/.env.example::env-var checker crashed (exit=$env_vars_exit). See job output."
                  echo "[FAIL] env-var checker crashed (exit=$env_vars_exit)."
                  RECIPE_FAILED=1
                fi

                while IFS= read -r line; do
                  [ -z "$line" ] && continue
                  kind="${line%%::*}"
                  rest="${line#*::}"
                  file="${rest%%::*}"
                  msg="${rest#*::}"
                  case "$kind" in
                    PASS)
                      echo "[PASS] $msg"
                      ;;
                    FAIL)
                      echo "::error file=$file::$msg"
                      echo "[FAIL] $msg"
                      RECIPE_FAILED=1
                      ;;
                    *)
                      echo "$line"
                      ;;
                  esac
                done <<< "$env_vars_result"
              fi

              # ------------------------------------------------------------------
              # Check 7: recipe must not carry its own Ruff configuration.
              #          Ruff config is centralized in the repo root pyproject.toml.
              #
              # Ruff discovers configuration from three sources (whichever is
              # nearest walking up from a target file):
              #   1. `[tool.ruff*]` tables in pyproject.toml
              #   2. a `ruff.toml`   file
              #   3. a `.ruff.toml`  file
              # All three must be blocked in recipe directories, or centralization
              # has a hole. `ruff.toml` and `.ruff.toml` are searched over the
              # whole recipe subtree because ruff walks up per-file, so a nested
              # copy would still override the root config for files below it.
              # ------------------------------------------------------------------
              pyproject="$recipe/pyproject.toml"
              check7_failed=0

              if [ -f "$pyproject" ] && grep -qE '^\s*\[tool\.ruff(\.|\])' "$pyproject"; then
                echo "::error file=$pyproject::Recipe pyproject.toml must not declare a [tool.ruff*] block. Ruff configuration is centralized in the repo root pyproject.toml (see [tool.ruff] there). Remove all [tool.ruff*] tables from this file."
                echo "[FAIL] pyproject.toml contains a [tool.ruff*] block — remove it (see root pyproject.toml)."
                check7_failed=1
              fi

              # Find any standalone ruff config files anywhere under the recipe.
              standalone_ruff_configs=$(find "$recipe" -type f \
                \( -name 'ruff.toml' -o -name '.ruff.toml' \) 2>/dev/null || true)
              if [ -n "$standalone_ruff_configs" ]; then
                while IFS= read -r ruff_cfg; do
                  [ -z "$ruff_cfg" ] && continue
                  echo "::error file=$ruff_cfg::Recipe must not contain a standalone ruff.toml or .ruff.toml. Ruff configuration is centralized in the repo root pyproject.toml. Delete this file."
                  echo "[FAIL] Standalone Ruff config found: $ruff_cfg — delete it (see root pyproject.toml)."
                done <<< "$standalone_ruff_configs"
                check7_failed=1
              fi

              if [ "$check7_failed" -eq 1 ]; then
                RECIPE_FAILED=1
              else
                echo "[PASS] Recipe carries no local Ruff configuration."
              fi

              # ------------------------------------------------------------------
              # Check 8: [project] metadata rules. Delegated to
              #          .github/scripts/check_recipe_pyproject.py:
              #    - project-name-matches-folder: [project].name must equal the
              #      recipe folder basename.
              #    - python-version-floor: [project].requires-python must not
              #      permit Python versions below 3.11.
              #    - description-matches-manifest: if [project].description is
              #      set, it must equal manifest.description (after .strip(),
              #      exact match).
              # ------------------------------------------------------------------
              if [ -f "$pyproject" ]; then
                # tomllib is stdlib on Python >= 3.11 (setup-uv installs 3.11);
                # pyyaml + packaging are pulled into an ephemeral env via
                # `uv run --with`. `packaging` is used for PEP 440 version
                # specifier parsing (see check_requires_python).
                set +e
                pyproject_result=$(uv run --no-project --with pyyaml --with packaging \
                  python .github/scripts/check_recipe_pyproject.py "$recipe")
                py_exit=$?
                set -e

                if [ "$py_exit" -ne 0 ]; then
                  echo "::error file=$pyproject::pyproject.toml metadata checker crashed (uv/python exit=$py_exit). See job output."
                  echo "[FAIL] pyproject.toml metadata checker crashed (uv/python exit=$py_exit)."
                  RECIPE_FAILED=1
                fi

                while IFS= read -r line; do
                  [ -z "$line" ] && continue
                  kind="${line%%::*}"
                  rest="${line#*::}"
                  file="${rest%%::*}"
                  msg="${rest#*::}"
                  case "$kind" in
                    PASS)
                      echo "[PASS] $msg"
                      ;;
                    FAIL)
                      echo "::error file=$file::$msg"
                      echo "[FAIL] $msg"
                      RECIPE_FAILED=1
                      ;;
                    *)
                      # Unrecognized line — surface it so it isn't silently lost.
                      echo "$line"
                      ;;
                  esac
                done <<< "$pyproject_result"
              fi

              # ------------------------------------------------------------------
              # Notice: Possible hardcoded model names in Python files
              # ------------------------------------------------------------------
              MODEL_PREFIXES="gemini-|gemini-exp-|imagen-|claude-|llama-|meta/llama-|mistral-|codestral-|phi-|grok-|command-|jamba-"

              # Use process substitution to avoid pipefail propagating through
              # find|while. Capture each grep result to a variable so non-zero
              # exit codes from grep (no matches) are handled safely with || true.
              while IFS= read -r pyfile; do
                matches=$(grep -onE "['\"]($MODEL_PREFIXES)[^ '\"]{1,35}['\"]" "$pyfile" || true)
                [ -z "$matches" ] && continue
                filtered=$(echo "$matches" | grep -v '^\s*#' || true)
                [ -z "$filtered" ] && continue
                while IFS=: read -r lineno match; do
                  [ -z "$lineno" ] && continue
                  echo "::notice file=$pyfile,line=$lineno::Possible hardcoded model name $match detected. If this is a model identifier, consider using an environment variable instead."
                  echo "[NOTICE] $pyfile:$lineno — possible hardcoded model name: $match"
                done <<< "$filtered"
              done < <(find "$recipe" -type f -name "*.py" ! -path "*/tests/*")

              if [ "$RECIPE_FAILED" -eq 1 ]; then
                exit 1
              fi
              echo ""
              echo "[PASS] All checks passed for: $recipe"
            ) || FAILED=1
          done <<< "$RECIPES"

          if [ "$FAILED" -eq 1 ]; then
            echo ""
            echo "========================================"
            echo "  One or more Python recipes failed validation."
            echo "  See errors above for details."
            echo "========================================"
            exit 1
          fi

          echo ""
          echo "[PASS] All Python recipes passed validation."
