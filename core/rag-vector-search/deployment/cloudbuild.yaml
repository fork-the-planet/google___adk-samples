# Cloud Build config that (re)schedules the data-ingestion pipeline on Vertex AI
# Pipelines. It only creates/updates a recurring PipelineJobSchedule
# (SCHEDULE_ONLY=TRUE); it does not run the pipeline inline. Wire it to a Cloud
# Build trigger (e.g. on merge to main) or run it manually:
#
#   gcloud builds submit --config deployment/cloudbuild.yaml \
#     --substitutions=\
#   _PROD_PROJECT_ID=my-project,\
#   _REGION=us-central1,\
#   _VECTOR_SEARCH_COLLECTION_ID=rag-vector-search-collection,\
#   _PIPELINE_GCS_ROOT=gs://my-project-rag-vector-search-rag,\
#   _PIPELINE_SA_EMAIL=rag-vector-search-rag@my-project.iam.gserviceaccount.com,\
#   _PIPELINE_NAME=rag-vector-search-ingestion,\
#   _CRON_SCHEDULE="0 2 * * *"
#
# (The bucket and service account are created by `make setup-infra`; see the
# `pipeline_gcs_bucket_name` Terraform output.)

steps:
  - name: "gcr.io/cloud-builders/gcloud"
    id: schedule-data-ingestion
    entrypoint: /bin/bash
    args:
      - -c
      - |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        export PATH="$$HOME/.local/bin:$$PATH"
        cd data_ingestion && uv sync --locked && \
        uv run python data_ingestion_pipeline/submit_pipeline.py
    env:
      - "PROJECT_ID=${_PROD_PROJECT_ID}"
      - "REGION=${_REGION}"
      - "VECTOR_SEARCH_COLLECTION_ID=${_VECTOR_SEARCH_COLLECTION_ID}"
      - "VECTOR_SEARCH_LOCATION=${_VECTOR_SEARCH_LOCATION}"
      - "PIPELINE_ROOT=${_PIPELINE_GCS_ROOT}"
      - "SERVICE_ACCOUNT=${_PIPELINE_SA_EMAIL}"
      - "PIPELINE_NAME=${_PIPELINE_NAME}"
      - "CRON_SCHEDULE=${_CRON_SCHEDULE}"
      - "DISABLE_CACHING=TRUE"
      - "SCHEDULE_ONLY=TRUE"

substitutions:
  _PROD_PROJECT_ID: YOUR_PROD_PROJECT_ID
  _REGION: us-central1
  _VECTOR_SEARCH_LOCATION: us-central1
  _VECTOR_SEARCH_COLLECTION_ID: rag-vector-search-collection
  _PIPELINE_GCS_ROOT: gs://YOUR_PIPELINE_BUCKET
  _PIPELINE_SA_EMAIL: YOUR_PIPELINE_SA@YOUR_PROD_PROJECT_ID.iam.gserviceaccount.com
  _PIPELINE_NAME: rag-vector-search-ingestion
  _CRON_SCHEDULE: "0 2 * * *"

options:
  env:
    - "UV_PYTHON=3.12"
  substitutionOption: ALLOW_LOOSE
  defaultLogsBucketBehavior: REGIONAL_USER_OWNED_BUCKET
